<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Server Files</title>

<style>
body {
    background: #0e0e0e;
    color: #e0e0e0;
    font-family: monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#top-bar {
    display: flex;
    padding: 6px;
    gap: 6px;
    border-bottom: 1px solid #333;
    background: #0b0b0b;
}

#token {
    flex: 1;
    background: #111;
    border: none;
    color: #fff;
    padding: 6px;
    outline: none;
}

button {
    background: #2563eb;
    border: none;
    color: white;
    padding: 6px 12px;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }

#main {
    flex: 1;
    display: flex;
    overflow: hidden;
}

#files {
    width: 320px;
    border-right: 1px solid #333;
    overflow-y: auto;
    padding: 6px;
}

#files div {
    padding: 4px;
    cursor: pointer;
}

#files div:hover {
    background: #1a1a1a;
}

.selected {
    background: #1e293b;
}

.dir { color: #60a5fa; }
.file { color: #e0e0e0; }

#editor {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#path {
    padding: 6px;
    border-bottom: 1px solid #333;
    background: #0b0b0b;
    font-size: 12px;
}

textarea {
    flex: 1;
    background: #111;
    color: #e0e0e0;
    border: none;
    padding: 10px;
    font-family: monospace;
    outline: none;
    resize: none;
}

#editor-bar {
    border-top: 1px solid #333;
    padding: 6px;
    display: flex;
    gap: 6px;
    background: #0b0b0b;
}

.system { color: #999; }
</style>
</head>

<body>

<div id="top-bar">
    <input id="token" placeholder="Authorization token (Bearer ...)" autocomplete="off">
    <button onclick="loadFiles()">Load</button>
    <button onclick="createFolder()">New Folder</button>
    <button onclick="uploadFile()">Upload</button>
</div>

<div id="main">
    <div id="files"></div>

    <div id="editor">
        <div id="path" class="system">No file selected</div>
        <textarea id="content" disabled></textarea>

        <div id="editor-bar">
            <button onclick="saveFile()">Save</button>
            <button onclick="renameEntry()">Rename</button>
            <button onclick="downloadFile()">Download</button>
            <button onclick="deleteEntry()">Delete</button>
        </div>
    </div>
</div>

<script>
const API = "http://localhost:5678";
const serverId = "86d5fb297105b3a154ddd960fabad820";

let currentPath = "";
let currentFile = null;
let currentIsDir = false;

const filesEl = document.getElementById("files");
const editor = document.getElementById("content");
const pathEl = document.getElementById("path");
const tokenEl = document.getElementById("token");

function auth() {
    return { "Authorization": tokenEl.value.trim() };
}

function postJson(url, body) {
    return fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            ...auth()
        },
        body: JSON.stringify(body)
    }).then(r => r.json());
}

// ------------------------------------------------
// LIST (GET)
// ------------------------------------------------
async function loadFiles(path = "") {
    currentPath = path;
    currentFile = null;
    currentIsDir = true;

    editor.value = "";
    editor.disabled = true;
    pathEl.textContent = path || "/";

    filesEl.innerHTML = "";

    const res = await fetch(
        `${API}/servers/files/list?id=${encodeURIComponent(serverId)}&path=${encodeURIComponent(path)}`,
        { headers: auth() }
    );

    const json = await res.json();
    if (!json.success) return;

    if (path) {
        const parent = path.split("/").slice(0, -1).join("/");
        addEntry("..", true, parent);
    }

    json.entries.forEach(e => {
        addEntry(e.name, e.isDirectory, e.path);
    });
}

function addEntry(name, isDir, path) {
    const div = document.createElement("div");
    div.textContent = isDir ? `[${name}]` : name;
    div.className = isDir ? "dir" : "file";

    div.onclick = () => {
        [...filesEl.children].forEach(c => c.classList.remove("selected"));
        div.classList.add("selected");

        currentIsDir = isDir;

        if (isDir) loadFiles(path);
        else openFile(path);
    };

    filesEl.appendChild(div);
}

// ------------------------------------------------
// READ (GET)
// ------------------------------------------------
async function openFile(path) {
    currentFile = path;
    currentIsDir = false;
    pathEl.textContent = path;

    const res = await fetch(
        `${API}/servers/files/read?id=${encodeURIComponent(serverId)}&path=${encodeURIComponent(path)}`,
        { headers: auth() }
    );

    const json = await res.json();
    if (!json.success) return;

    editor.value = json.content;
    editor.disabled = false;
}

// ------------------------------------------------
// WRITE (POST)
// ------------------------------------------------
async function saveFile() {
    if (!currentFile || currentIsDir) return;

    await postJson(
        `${API}/servers/files/write`,
        { id: serverId, path: currentFile, content: editor.value }
    );
}

// ------------------------------------------------
// DELETE (POST)
// ------------------------------------------------
async function deleteEntry() {
    const target = currentIsDir ? currentPath : currentFile;
    if (!target) return;

    if (!confirm("Delete selected entry?")) return;

    await postJson(
        `${API}/servers/files/delete`,
        { id: serverId, path: target }
    );

    loadFiles(currentPath);
}

// ------------------------------------------------
// RENAME / MOVE (POST)
// ------------------------------------------------
async function renameEntry() {
    const target = currentIsDir ? currentPath : currentFile;
    if (!target) return;

    const name = prompt("New name:");
    if (!name) return;

    const parts = target.split("/");
    parts.pop();
    const to = parts.length ? parts.join("/") + "/" + name : name;

    await postJson(
        `${API}/servers/files/move`,
        { id: serverId, from: target, to, overwrite: false }
    );

    loadFiles(currentPath);
}

// ------------------------------------------------
// MKDIR (POST)
// ------------------------------------------------
async function createFolder() {
    const name = prompt("Folder name:");
    if (!name) return;

    const full = currentPath ? currentPath + "/" + name : name;

    await postJson(
        `${API}/servers/files/mkdir`,
        { id: serverId, path: full }
    );

    loadFiles(currentPath);
}

// ------------------------------------------------
// UPLOAD (multipart POST)
// ------------------------------------------------
function uploadFile() {
    const i = document.createElement("input");
    i.type = "file";

    i.onchange = () => {
        const fd = new FormData();
        fd.append("id", serverId);
        fd.append("path", currentPath.endsWith("/") ? currentPath : currentPath + "/");
        fd.append("file", i.files[0]);

        fetch(`${API}/servers/files/upload`, {
            method: "POST",
            headers: auth(),
            body: fd
        }).then(() => loadFiles(currentPath));
    };

    i.click();
}

// ------------------------------------------------
// DOWNLOAD (GET)
// ------------------------------------------------
async function downloadFile() {
    if (!currentFile || currentIsDir) return;

    const token = tokenEl.value.trim();
    if (!token) {
        alert("Authorization token required");
        return;
    }

    const url =
        `${API}/servers/files/download` +
        `?id=${encodeURIComponent(serverId)}` +
        `&path=${encodeURIComponent(currentFile)}`;

    const res = await fetch(url, {
        method: "GET",
        headers: {
            "Authorization": token
        }
    });

    if (!res.ok) {
        const msg = await res.text();
        alert("Download failed: " + msg);
        return;
    }

    const blob = await res.blob();
    const fileName = currentFile.split("/").pop();

    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = objectUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();

    a.remove();
    URL.revokeObjectURL(objectUrl);
}
</script>

</body>
</html>
